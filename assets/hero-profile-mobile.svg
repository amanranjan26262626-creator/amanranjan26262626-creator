    <text x="360" y="211" fill="#83B7FF" font-size="25" font-weight="680">Founder &amp; Director — LACSA TECH</text>
    <text x="360" y="250" fill="#C8B8FF" font-size="22" font-weight="620">Application Security Engineer · Cybersecurity Expert</text>
    <text x="360" y="282" fill="#C8B8FF" font-size="23" font-weight="680">AI Expert</text>
