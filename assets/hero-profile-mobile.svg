<svg xmlns="http://www.w3.org/2000/svg" width="720" height="650" viewBox="0 0 720 650" role="img" aria-labelledby="title desc">
  <title id="title">Aman Ranjan — Executive Mobile Profile</title>
  <desc id="desc">Mobile profile banner for Aman Ranjan, Founder and Director of LACSA TECH, Application Security Engineer, Cybersecurity Expert and AI Expert.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#05070C"/><stop offset=".52" stop-color="#0A1020"/><stop offset="1" stop-color="#12101A"/></linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#6EA8FE"/><stop offset=".5" stop-color="#9B8AFB"/><stop offset="1" stop-color="#D7B56D"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111A2C"/><stop offset="1" stop-color="#15131E"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#315FA8" stop-opacity=".22"/><stop offset="1" stop-color="#315FA8" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="720" height="650" rx="28" fill="url(#bg)"/>
  <circle cx="160" cy="170" r="360" fill="url(#glow)"/>
  <rect x="2" y="2" width="716" height="646" rx="26" fill="none" stroke="url(#edge)" stroke-opacity=".74" stroke-width="4"/>

  <g text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif">
