<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Aman Ranjan — Cybersecurity, AppSec and AI</title>
  <desc id="desc">Professional command-center banner for Aman Ranjan, Founder and Director of LACSA TECH, Application Security Engineer, Cybersecurity Expert and AI Expert.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.48" stop-color="#0A1530"/>
      <stop offset="1" stop-color="#06151D"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2F81F7"/>
      <stop offset="0.45" stop-color="#22D3EE"/>
      <stop offset="0.72" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D2A50"/>
      <stop offset="1" stop-color="#101A3A"/>
    </linearGradient>
    <radialGradient id="glowBlue">
      <stop offset="0" stop-color="#2F81F7" stop-opacity=".30"/>
      <stop offset="1" stop-color="#2F81F7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet">
      <stop offset="0" stop-color="#A78BFA" stop-opacity=".22"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#58A6FF" stroke-opacity=".075"/>
    </pattern>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="560" rx="30" fill="url(#bg)"/>
  <rect width="1400" height="560" rx="30" fill="url(#grid)"/>
  <circle cx="1150" cy="240" r="360" fill="url(#glowBlue)"/>
  <circle cx="780" cy="40" r="330" fill="url(#glowViolet)"/>
  <rect x="2" y="2" width="1396" height="556" rx="28" fill="none" stroke="url(#line)" stroke-opacity=".68" stroke-width="3"/>
  <path d="M0 469C280 415 485 535 760 477S1160 420 1400 467V560H0Z" fill="#58A6FF" fill-opacity=".035"/>

  <g transform="translate(70 62)">
    <rect width="360" height="34" rx="17" fill="#0D213A" stroke="#2F81F7" stroke-opacity=".52"/>
    <circle cx="20" cy="17" r="5" fill="#3FB950" filter="url(#soft)">
      <animate attributeName="opacity" values="1;.35;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="36" y="22" fill="#8B949E" font-family="Consolas, 'Courier New', monospace" font-size="14" letter-spacing="1.5">IDENTITY://AMAN.RANJAN</text>

    <text y="116" fill="#F0F6FC" font-family="'Segoe UI', Arial, sans-serif" font-size="74" font-weight="800" letter-spacing="-2.5">AMAN RANJAN</text>
    <rect y="139" width="690" height="5" rx="2.5" fill="url(#line)"/>
    <text y="188" fill="#79C0FF" font-family="Consolas, 'Courier New', monospace" font-size="25" font-weight="700" letter-spacing="1.2">FOUNDER &amp; DIRECTOR · LACSA TECH</text>
    <text y="226" fill="#D2A8FF" font-family="Consolas, 'Courier New', monospace" font-size="22" font-weight="650" letter-spacing=".9">APPSEC ENGINEER · CYBERSECURITY EXPERT · AI EXPERT</text>
    <text y="276" fill="#C9D1D9" font-family="'Segoe UI', Arial, sans-serif" font-size="20">Building secure systems, practical AI, and founder-first education.</text>

    <g transform="translate(0 315)">
      <rect width="525" height="58" rx="13" fill="#111B32" stroke="#F59E0B" stroke-opacity=".55"/>
      <rect width="6" height="58" rx="3" fill="#F59E0B"/>
      <text x="25" y="23" fill="#FBBF24" font-family="Consolas, 'Courier New', monospace" font-size="12" letter-spacing="1.7">LACSA TECH</text>
      <text x="25" y="45" fill="#F0F6FC" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="650">India's First AI Startup Institute</text>
    </g>

    <g transform="translate(0 397)" font-family="Consolas, 'Courier New', monospace">
      <g>
        <rect width="214" height="55" rx="12" fill="#0D213A" stroke="#2F81F7" stroke-opacity=".45"/>
        <text x="17" y="23" fill="#79C0FF" font-size="13">WORKSHOP REACH</text>
        <text x="17" y="44" fill="#F0F6FC" font-size="20" font-weight="700">10,000+</text>
      </g>
      <g transform="translate(230)">
        <rect width="214" height="55" rx="12" fill="#101F32" stroke="#22D3EE" stroke-opacity=".45"/>
        <text x="17" y="23" fill="#67E8F9" font-size="13">SECURITY FINDINGS</text>
        <text x="17" y="44" fill="#F0F6FC" font-size="20" font-weight="700">43</text>
      </g>
      <g transform="translate(460)">
        <rect width="214" height="55" rx="12" fill="#171B38" stroke="#A78BFA" stroke-opacity=".45"/>
        <text x="17" y="23" fill="#C4B5FD" font-size="13">ASSETS MIGRATED</text>
        <text x="17" y="44" fill="#F0F6FC" font-size="20" font-weight="700">100,000+</text>
      </g>
    </g>
  </g>

  <g transform="translate(960 87)">
    <circle cx="180" cy="180" r="176" fill="#071120" fill-opacity=".58" stroke="#58A6FF" stroke-opacity=".20"/>
    <circle cx="180" cy="180" r="144" fill="none" stroke="#58A6FF" stroke-opacity=".18" stroke-dasharray="4 10">
      <animateTransform attributeName="transform" type="rotate" from="0 180 180" to="360 180 180" dur="38s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="180" r="112" fill="none" stroke="#A78BFA" stroke-opacity=".15" stroke-dasharray="3 13">
      <animateTransform attributeName="transform" type="rotate" from="360 180 180" to="0 180 180" dur="26s" repeatCount="indefinite"/>
    </circle>

    <path d="M180 62L267 94V164C267 229 232 275 180 300C128 275 93 229 93 164V94Z" fill="url(#shield)" stroke="url(#line)" stroke-width="4"/>
    <path d="M139 175L168 204L224 140" fill="none" stroke="#3FB950" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>

    <g stroke="#22D3EE" stroke-width="2" stroke-opacity=".62" fill="#071120">
      <path d="M180 31V57"/><circle cx="180" cy="24" r="6" fill="#22D3EE"/>
      <path d="M329 180H300"/><circle cx="337" cy="180" r="6" fill="#A78BFA"/>
      <path d="M180 329V306"/><circle cx="180" cy="338" r="6" fill="#F59E0B"/>
      <path d="M31 180H60"/><circle cx="23" cy="180" r="6" fill="#2F81F7"/>
      <path d="M73 73L96 96"/><circle cx="67" cy="67" r="5" fill="#22D3EE"/>
      <path d="M287 73L264 96"/><circle cx="293" cy="67" r="5" fill="#A78BFA"/>
      <path d="M287 287L264 264"/><circle cx="293" cy="293" r="5" fill="#F59E0B"/>
      <path d="M73 287L96 264"/><circle cx="67" cy="293" r="5" fill="#3FB950"/>
    </g>

    <g font-family="Consolas, 'Courier New', monospace" font-weight="700" text-anchor="middle">
      <rect x="115" y="153" width="130" height="30" rx="15" fill="#0D1117" stroke="#A78BFA" stroke-opacity=".4"/>
      <text x="180" y="174" fill="#C4B5FD" font-size="14">SECURITY × AI</text>
      <text x="180" y="383" fill="#8B949E" font-size="13" letter-spacing="2.2">DEFEND · BUILD · ENABLE</text>
    </g>
  </g>

  <rect x="10" y="265" width="1380" height="2" fill="url(#line)" opacity=".12">
    <animate attributeName="y" values="20;535;20" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.22;0" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
