<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">Aman Ranjan — Mobile Profile Banner</title>
  <desc id="desc">Mobile-first banner for Aman Ranjan, Founder and Director, Application Security Engineer, Cybersecurity Expert and AI Expert.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050816"/><stop offset=".5" stop-color="#0A1530"/><stop offset="1" stop-color="#06151D"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#2F81F7"/><stop offset=".48" stop-color="#22D3EE"/><stop offset=".75" stop-color="#A78BFA"/><stop offset="1" stop-color="#F59E0B"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#2F81F7" stop-opacity=".28"/><stop offset="1" stop-color="#2F81F7" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#58A6FF" stroke-opacity=".08"/></pattern>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="720" height="900" rx="30" fill="url(#bg)"/>
  <rect width="720" height="900" rx="30" fill="url(#grid)"/>
  <circle cx="360" cy="425" r="330" fill="url(#glow)"/>
  <rect x="2" y="2" width="716" height="896" rx="28" fill="none" stroke="url(#line)" stroke-width="3"/>

  <g text-anchor="middle">
