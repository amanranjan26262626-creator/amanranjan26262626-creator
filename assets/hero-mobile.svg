    <circle cx="206" cy="71" r="5" fill="#3FB950" filter="url(#soft)"><animate attributeName="opacity" values="1;.35;1" dur="2.2s" repeatCount="indefinite"/></circle>
    <text x="370" y="78" fill="#8B949E" font-family="Consolas, 'Courier New', monospace" font-size="19" letter-spacing="1.2">IDENTITY://AMAN.RANJAN</text>

    <text x="360" y="162" fill="#F0F6FC" font-family="'Segoe UI', Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="-2">AMAN RANJAN</text>
    <rect x="110" y="185" width="500" height="5" rx="2.5" fill="url(#line)"/>
    <text x="360" y="233" fill="#79C0FF" font-family="Consolas, 'Courier New', monospace" font-size="24" font-weight="700">FOUNDER &amp; DIRECTOR · LACSA TECH</text>
    <text x="360" y="270" fill="#D2A8FF" font-family="Consolas, 'Courier New', monospace" font-size="22" font-weight="650">APPSEC ENGINEER · CYBERSECURITY EXPERT</text>
    <text x="360" y="299" fill="#D2A8FF" font-family="Consolas, 'Courier New', monospace" font-size="24" font-weight="700">AI EXPERT</text>
  </g>

  <g transform="translate(220 315)">
    <circle cx="140" cy="140" r="138" fill="#071120" fill-opacity=".72" stroke="#58A6FF" stroke-opacity=".23"/>
    <circle cx="140" cy="140" r="112" fill="none" stroke="#A78BFA" stroke-opacity=".2" stroke-dasharray="4 10"><animateTransform attributeName="transform" type="rotate" from="0 140 140" to="360 140 140" dur="32s" repeatCount="indefinite"/></circle>
    <path d="M140 41L211 67V126C211 179 182 217 140 238C98 217 69 179 69 126V67Z" fill="#0D2341" stroke="url(#line)" stroke-width="4"/>
    <path d="M107 137L131 161L176 109" fill="none" stroke="#3FB950" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>
    <rect x="79" y="126" width="122" height="28" rx="14" fill="#0D1117" stroke="#A78BFA" stroke-opacity=".42"/>
    <text x="140" y="146" text-anchor="middle" fill="#C4B5FD" font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="700">SECURITY × AI</text>
  </g>

  <g transform="translate(65 625)" font-family="Consolas, 'Courier New', monospace">
    <rect width="590" height="74" rx="15" fill="#111B32" stroke="#F59E0B" stroke-opacity=".55"/>
    <rect width="7" height="74" rx="3.5" fill="#F59E0B"/>
    <text x="25" y="29" fill="#FBBF24" font-size="18" letter-spacing="1.7">LACSA TECH</text>
    <text x="25" y="57" fill="#F0F6FC" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="650">India's First AI Startup Institute</text>
  </g>

  <g transform="translate(65 724)" font-family="Consolas, 'Courier New', monospace">
    <g><rect width="185" height="105" rx="14" fill="#0D213A" stroke="#2F81F7" stroke-opacity=".46"/><text x="16" y="30" fill="#79C0FF" font-size="17">WORKSHOP LEARNERS</text><text x="16" y="66" fill="#F0F6FC" font-size="31" font-weight="700">10,000+</text><text x="16" y="89" fill="#8B949E" font-size="16">TRAINED</text></g>
    <g transform="translate(202)"><rect width="185" height="105" rx="14" fill="#101F32" stroke="#22D3EE" stroke-opacity=".46"/><text x="16" y="30" fill="#67E8F9" font-size="17">FINDINGS</text><text x="16" y="66" fill="#F0F6FC" font-size="31" font-weight="700">43</text><text x="16" y="89" fill="#8B949E" font-size="15">ONE ASSESSMENT</text></g>
    <g transform="translate(404)"><rect width="185" height="105" rx="14" fill="#171B38" stroke="#A78BFA" stroke-opacity=".46"/><text x="16" y="30" fill="#C4B5FD" font-size="17">MIGRATIONS</text><text x="16" y="66" fill="#F0F6FC" font-size="31" font-weight="700">50+</text><text x="16" y="89" fill="#8B949E" font-size="16">100K+ ASSETS</text></g>
