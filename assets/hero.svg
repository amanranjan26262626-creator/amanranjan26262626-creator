    <text y="178" fill="#79C0FF" font-family="Consolas, 'Courier New', monospace" font-size="25" font-weight="600" letter-spacing="2">CYBERSECURITY × APPSEC × ARTIFICIAL INTELLIGENCE</text>
    <text y="222" fill="#C9D1D9" font-family="'Segoe UI', Arial, sans-serif" font-size="19">Cybersecurity &amp; AppSec Expert  ·  AI Expert  ·  Founder, LACSA TECH</text>
    <text y="256" fill="#8B949E" font-family="'Segoe UI', Arial, sans-serif" font-size="17">Securing platforms. Building intelligent systems. Teaching practical skills.</text>

    <g transform="translate(0 291)" font-family="Consolas, 'Courier New', monospace" font-size="13" font-weight="600">
      <rect width="185" height="36" rx="9" fill="#0D213A" stroke="#58A6FF" stroke-opacity="0.35"/>
      <text x="16" y="23" fill="#79C0FF">43  SECURITY FINDINGS</text>
      <rect x="199" width="155" height="36" rx="9" fill="#0D213A" stroke="#38BDF8" stroke-opacity="0.35"/>
      <text x="215" y="23" fill="#7DD3FC">50+  PLATFORMS</text>
      <rect x="368" width="180" height="36" rx="9" fill="#0D2A25" stroke="#3FB950" stroke-opacity="0.38"/>
      <text x="384" y="23" fill="#56D364">1,000+  STUDENTS</text>
