<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Aman Ranjan — Cybersecurity, AppSec and AI Expert</title>
  <desc id="desc">Professional profile banner for Aman Ranjan, a cybersecurity, application security and AI expert, and founder of LACSA TECH.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070B16"/>
      <stop offset="0.52" stop-color="#0B1630"/>
      <stop offset="1" stop-color="#06141D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58A6FF"/>
      <stop offset="0.55" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#3FB950"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2F81F7" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2F81F7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#58A6FF" stroke-opacity="0.08"/>
    </pattern>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1400" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1400" height="420" rx="28" fill="url(#grid)"/>
  <circle cx="1160" cy="195" r="300" fill="url(#glow)"/>
  <path d="M0 354 C280 310 420 414 710 360 S1130 296 1400 352 V420 H0Z" fill="#58A6FF" fill-opacity="0.035"/>
  <rect x="1.5" y="1.5" width="1397" height="417" rx="26.5" fill="none" stroke="url(#accent)" stroke-opacity="0.55" stroke-width="3"/>

  <g transform="translate(76 66)">
    <rect width="430" height="34" rx="17" fill="#58A6FF" fill-opacity="0.10" stroke="#58A6FF" stroke-opacity="0.35"/>
    <circle cx="19" cy="17" r="5" fill="#3FB950" filter="url(#softGlow)"/>
    <text x="34" y="22" fill="#8B949E" font-family="Consolas, 'Courier New', monospace" font-size="14" letter-spacing="1.4">CYBERSECURITY  •  APPSEC  •  AI EXPERT</text>

    <text y="112" fill="#F0F6FC" font-family="'Segoe UI', Arial, sans-serif" font-size="66" font-weight="750" letter-spacing="-2">AMAN RANJAN</text>
