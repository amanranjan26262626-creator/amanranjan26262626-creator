    <circle cx="145" cy="145" r="106" fill="none" stroke="#58A6FF" stroke-opacity="0.16" stroke-dasharray="5 11"/>
    <path d="M145 52 L220 80 V137 C220 191 190 229 145 250 C100 229 70 191 70 137 V80Z" fill="#0B1F35" stroke="url(#accent)" stroke-width="4"/>
    <path d="M113 145 L137 169 L180 119" fill="none" stroke="#3FB950" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>

