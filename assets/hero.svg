    <g stroke="#58A6FF" stroke-opacity="0.42" stroke-width="2">
      <path d="M145 23V45"/><path d="M267 145H240"/><path d="M145 267V245"/><path d="M23 145H50"/>
      <path d="M55 55L78 78"/><path d="M235 55L212 78"/><path d="M235 235L212 212"/><path d="M55 235L78 212"/>
    </g>
    <g fill="#38BDF8">
      <circle cx="55" cy="55" r="4"/><circle cx="235" cy="55" r="4"/><circle cx="235" cy="235" r="4"/><circle cx="55" cy="235" r="4"/>
    </g>
    <text x="145" y="320" text-anchor="middle" fill="#8B949E" font-family="Consolas, 'Courier New', monospace" font-size="14" letter-spacing="2">SECURE • BUILD • ENABLE</text>
